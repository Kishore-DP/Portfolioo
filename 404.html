<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Kishore DP</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --txt:#eaf2ea; --card:rgba(20,26,33,.82); --brand:#e8b34d; --brand-2:#ffd873;
      --font-display:'Cinzel','Georgia',serif; --font-body:'Manrope',-apple-system,sans-serif;
      --ease-out:cubic-bezier(.16,1,.3,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; }
    body { font-family:var(--font-body); color:var(--txt);
      background:#07060a radial-gradient(ellipse at 50% 30%, rgba(232,179,77,.1), transparent 60%);
      display:flex; align-items:center; justify-content:center; padding:6vh 5vw; }
    .card { max-width:480px; width:100%; text-align:left; background:var(--card); border:1px solid rgba(255,255,255,.1);
      border-radius:24px; padding:44px 40px; box-shadow:0 40px 100px rgba(0,0,0,.6); position:relative; overflow:hidden;
      opacity:0; transform:translateY(16px) scale(.98); animation:rise .6s var(--ease-out) .1s forwards; }
    .card::before { content:''; position:absolute; inset:0 0 auto 0; height:4px;
      background:linear-gradient(90deg,transparent,var(--brand),transparent); }
    @keyframes rise { to{ opacity:1; transform:none; } }
    .eyebrow { font-size:.75rem; letter-spacing:.2em; text-transform:uppercase; color:var(--brand); font-weight:800; margin-bottom:12px; }
    h1 { font-family:var(--font-display); font-size:3.2rem; font-weight:800; line-height:1;
      background:linear-gradient(180deg,#fff6e0,var(--brand-2) 50%,var(--brand)); -webkit-background-clip:text; background-clip:text; color:transparent;
      margin-bottom:12px; filter:drop-shadow(0 4px 24px rgba(232,179,77,.25)); }
    p { line-height:1.62; color:#c9cdc8; margin-bottom:24px; max-width:52ch; }
    a.home { display:inline-flex; align-items:center; gap:10px; padding:14px 22px; border-radius:14px; text-decoration:none;
      color:#241608; font-weight:700; background:linear-gradient(135deg,var(--brand-2),var(--brand));
      box-shadow:0 10px 28px rgba(232,179,77,.25); transition:filter .2s ease, transform .22s var(--ease-spring), box-shadow .2s ease; }
    a.home:hover { filter:brightness(1.06); transform:translateY(-2px); box-shadow:0 14px 34px rgba(232,179,77,.35); }
    a.home:active { transform:scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Kishore DP</div>
    <h1>404</h1>
    <p>This page wandered off the map. The floating medieval market — and the rest of the portfolio — is back at the entrance.</p>
    <a class="home" href="./">← Back to the portfolio</a>
  </div>
</body>
</html>
